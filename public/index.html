<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MenuShot — Powered by Flipdish</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fd-blue:#1a73e8;
  --fd-blue2:#1558b0;
  --fd-blue3:#0d47a1;
  --fd-orange:#ff6b35;
  --fd-orange2:#e55a25;
  --fd-light:#e8f1fd;
  --bg:#f0f4ff;
  --bg2:#ffffff;
  --bg3:#e8f0fe;
  --surface:#ffffff;
  --border:#d0e0f8;
  --border2:#b8d0f5;
  --text:#0a1628;
  --text2:#3d5a8a;
  --text3:#7a9abf;
  --green:#00c896;
  --red:#ff4444;
  --pexels:#00b38a;
  --pexels-bg:rgba(0,179,138,0.1);
  --pexels-bd:rgba(0,179,138,0.3);
  --pixabay:#1a73e8;
  --pixabay-bg:rgba(26,115,232,0.1);
  --pixabay-bd:rgba(26,115,232,0.3);
  --r:14px;--rsm:8px;--rp:999px
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}

/* HEADER */
header{padding:0 40px;height:66px;display:flex;align-items:center;gap:14px;background:var(--fd-blue);position:sticky;top:0;z-index:500;box-shadow:0 2px 20px rgba(26,115,232,0.4)}

.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-wordmark{font-size:22px;font-weight:800;color:white;letter-spacing:-0.03em;display:flex;align-items:center;gap:6px}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.6);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-left:4px;align-self:flex-end;padding-bottom:2px}

/* Flippy mascot in header - dish cover with stick legs */
.flippy-header{width:44px;height:44px;flex-shrink:0}

.header-center{flex:1;display:flex;justify-content:center}
.header-title{font-size:16px;font-weight:700;color:white;letter-spacing:-0.01em}

.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-badge{font-size:11px;color:white;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:var(--rp);padding:5px 13px;display:flex;align-items:center;gap:6px;font-weight:600;backdrop-filter:blur(8px)}
.live-dot{width:7px;height:7px;background:#00e676;border-radius:50%;box-shadow:0 0 8px #00e676;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:48px 32px 100px}

/* HERO */
.hero{display:flex;align-items:center;justify-content:space-between;gap:32px;margin-bottom:40px;background:white;border-radius:20px;padding:36px 40px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(26,115,232,0.08)}
.hero-left h1{font-size:38px;font-weight:800;line-height:1.1;letter-spacing:-0.03em;margin-bottom:10px;color:var(--text)}
.hero-left h1 .blue{color:var(--fd-blue)}
.hero-left h1 .orange{color:var(--fd-orange)}
.hero-left p{font-size:15px;color:var(--text2);max-width:440px;line-height:1.7}
.hero-right{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.hero-mascot{width:100px;height:100px}
.hero-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 20px;text-align:center}
.hero-stat .num{font-size:32px;font-weight:800;color:var(--fd-blue);line-height:1}
.hero-stat .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600}

/* PANEL */
.panel{background:white;border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:24px;box-shadow:0 2px 12px rgba(26,115,232,0.06)}
.input-row{display:flex;gap:8px;margin-bottom:12px}
.inp-wrap{flex:1;position:relative;display:flex;align-items:center}
.inp-wrap svg{position:absolute;left:13px;width:15px;height:15px;fill:var(--text3);pointer-events:none}
#sInp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rsm);height:46px;padding:0 14px 0 38px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s}
#sInp:focus{border-color:var(--fd-blue);box-shadow:0 0 0 3px rgba(26,115,232,0.12)}
#sInp::placeholder{color:var(--text3)}

.tags{display:flex;flex-wrap:wrap;gap:6px;min-height:2px}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(26,115,232,0.08);border:1.5px solid rgba(26,115,232,0.2);border-radius:var(--rp);padding:4px 8px 4px 12px;font-size:12px;color:var(--fd-blue);font-weight:600}
.tx{background:none;border:none;cursor:pointer;color:var(--fd-blue);font-size:16px;line-height:1;padding:0;opacity:0.5;transition:opacity 0.15s;display:flex;align-items:center}
.tx:hover{opacity:1}

.ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
.srcs{display:flex;gap:6px}
.sep{width:1px;height:22px;background:var(--border)}
.pill{height:30px;padding:0 12px;border-radius:var(--rp);border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;color:var(--text3);transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.pip{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.7}
.pill.on-pexels{background:var(--pexels-bg);color:var(--pexels);border-color:var(--pexels-bd)}
.pill.on-pixabay{background:var(--pixabay-bg);color:var(--pixabay);border-color:var(--pixabay-bd)}
.opt{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);font-weight:500}
select{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:12px;font-family:'Inter',sans-serif;padding:0 8px;height:30px;cursor:pointer;outline:none}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;font-weight:500}
input[type=checkbox]{accent-color:var(--fd-blue);cursor:pointer;width:13px;height:13px}

.btn{height:46px;padding:0 20px;border-radius:var(--rsm);border:none;background:var(--bg3);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--border)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--fd-blue);color:white;box-shadow:0 4px 12px rgba(26,115,232,0.3)}
.btn-primary:hover{background:var(--fd-blue2);background:var(--fd-blue2)}
.mla{margin-left:auto}

.pgw{height:4px;background:var(--border);border-radius:4px;margin-bottom:20px;overflow:hidden;display:none;border-radius:4px}
.pgw.on{display:block}
.pgb{height:100%;background:linear-gradient(90deg,var(--fd-blue),var(--fd-orange),var(--fd-blue));background-size:200%;animation:flow 1.5s linear infinite;transition:width 0.5s ease;width:0%}
@keyframes flow{0%{background-position:0%}100%{background-position:200%}}

.strow{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text2);margin-bottom:20px;min-height:18px;font-weight:500}
.spin{width:14px;height:14px;border:2.5px solid var(--border);border-top-color:var(--fd-blue);border-radius:50%;animation:spin 0.65s linear infinite;display:none;flex-shrink:0}
.spin.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS */
.ib{margin-bottom:40px;animation:rise 0.3s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ih{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--fd-blue);display:flex}
.in{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
.itag{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:var(--rp);padding:2px 10px;font-weight:600}

.sg{margin-bottom:20px}
.sl{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sn{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%}
.dp{background:var(--pexels)}.dx{background:var(--fd-blue)}
.ball{margin-left:auto;font-size:11px;color:var(--fd-blue);text-decoration:none;font-weight:600;opacity:0.8;transition:opacity 0.15s}
.ball:hover{opacity:1;text-decoration:underline}

/* CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.ic{background:white;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s}
.ic:hover{border-color:var(--fd-blue);transform:translateY(-3px);box-shadow:0 12px 32px rgba(26,115,232,0.15)}
.ciw{width:100%;aspect-ratio:4/3;background:var(--bg3);overflow:hidden;position:relative;flex-shrink:0}
.ciw img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.35s ease}
.ic:hover .ciw img{transform:scale(1.05)}
.ciw.sk{background:linear-gradient(90deg,var(--bg) 25%,white 50%,var(--bg) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.cov{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,115,232,0.85) 0%,transparent 55%);opacity:0;transition:opacity 0.22s;display:flex;align-items:flex-end;padding:10px}
.ic:hover .cov{opacity:1}
.covbtn{font-size:11px;font-weight:700;color:white;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.3);border-radius:var(--rp);padding:5px 13px}
.sbadge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:var(--rp)}
.bp{background:rgba(0,179,138,0.15);color:var(--pexels);border:1px solid rgba(0,179,138,0.3)}
.bx{background:rgba(26,115,232,0.15);color:var(--fd-blue);border:1px solid rgba(26,115,232,0.3)}
.cb{padding:10px 12px 12px;display:flex;flex-direction:column;gap:3px}
.ct{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px}
.cc{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co{font-size:11px;color:var(--fd-blue);font-weight:700;white-space:nowrap}

/* SKELETON */
.skc{background:white;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.ski{width:100%;aspect-ratio:4/3;background:linear-gradient(90deg,var(--bg) 25%,white 50%,var(--bg) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
.skb{padding:10px 12px 12px;display:flex;flex-direction:column;gap:7px}
.skl{height:11px;border-radius:4px;background:linear-gradient(90deg,var(--bg) 25%,white 50%,var(--bg) 75%);background-size:200% 100%;animation:sh 1.4s infinite}

/* LIGHTBOX */
#lb{position:fixed;inset:0;background:rgba(10,22,40,0.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(12px)}
.lbb{background:white;border-radius:20px;max-width:920px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,0.4)}
.lia{flex:1;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;max-height:66vh;position:relative;min-height:200px}
.lia img{max-width:100%;max-height:100%;object-fit:contain;display:none}
.lia img.ready{display:block}
.lia .spin{display:block;width:22px;height:22px;position:absolute}
.lif{padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:white}
.lit .litn{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.lit .lisu{font-size:12px;color:var(--text3)}
.lia-btns{margin-left:auto;display:flex;gap:8px}
.lbtn{height:38px;padding:0 16px;border-radius:var(--rsm);border:1.5px solid var(--border);background:white;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:all 0.15s}
.lbtn:hover{background:var(--bg)}
.lbtn.p{background:var(--fd-blue);color:white;border-color:var(--fd-blue);box-shadow:0 4px 12px rgba(26,115,232,0.3)}
.lbtn.p:hover{background:var(--fd-blue2)}
.lcls{width:38px;height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:20px;line-height:1;transition:all 0.15s;font-family:sans-serif}
.lcls:hover{background:var(--border)}

/* EMPTY */
.empty{text-align:center;padding:80px 24px}
.ei{font-size:52px;display:block;margin-bottom:16px;opacity:0.3}
.et{font-size:20px;font-weight:800;color:var(--text2);margin-bottom:8px;letter-spacing:-0.02em}
.es{font-size:13px;color:var(--text3)}

#toast{position:fixed;bottom:24px;right:24px;background:white;border:1.5px solid var(--border);border-radius:var(--rsm);padding:12px 18px;font-size:13px;color:var(--text);z-index:9999;transform:translateY(70px);opacity:0;transition:all 0.3s;pointer-events:none;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.1)}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{color:var(--green);border-color:rgba(0,200,150,0.3)}
#toast.err{color:var(--red);border-color:rgba(255,68,68,0.3)}
.idiv{height:2px;background:linear-gradient(90deg,var(--fd-blue),transparent);margin:8px 0 32px;border-radius:2px;opacity:0.2}

@media(max-width:700px){
  header{padding:0 16px}main{padding:28px 16px 80px}
  .hero{flex-direction:column;padding:24px}.hero-right{flex-direction:row;align-items:center}
  .hero-left h1{font-size:28px}.cg{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <!-- Flippy mascot - dish cover with stick legs and orange accent -->
    <svg class="flippy-header" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- stick legs -->
      <line x1="16" y1="34" x2="14" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="28" y1="34" x2="30" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <!-- feet -->
      <line x1="11" y1="42" x2="17" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="27" y1="42" x2="33" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <!-- dish plate -->
      <ellipse cx="22" cy="34" rx="14" ry="3" fill="white"/>
      <!-- dish cover dome -->
      <ellipse cx="22" cy="34" rx="13" ry="2.5" fill="white"/>
      <path d="M9 34 Q9 16 22 14 Q35 16 35 34 Z" fill="white"/>
      <!-- orange handle on top -->
      <circle cx="22" cy="13" r="4" fill="#ff6b35"/>
      <circle cx="22" cy="10" r="2.5" fill="#ff6b35"/>
      <!-- eyes -->
      <circle cx="17" cy="26" r="2.5" fill="#1a73e8"/>
      <circle cx="27" cy="26" r="2.5" fill="#1a73e8"/>
      <circle cx="17.8" cy="26" r="1" fill="white"/>
      <circle cx="27.8" cy="26" r="1" fill="white"/>
      <!-- smile -->
      <path d="M17 30 Q22 34 27 30" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="logo-wordmark">
      flipdish
      <span class="logo-sub">MenuShot</span>
    </div>
  </a>

  <div class="header-right">
    <div class="live-badge">
      <span class="live-dot"></span>
      Live
    </div>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-left">
      <h1>Stock photos for<br/><span class="blue">every</span> <span class="orange">menu item</span></h1>
      <p>Search Pexels &amp; Pixabay instantly. Real food photos with live previews — click any card to expand, then download free.</p>
    </div>
    <div class="hero-right">
      <!-- Big Flippy mascot in hero -->
      <svg class="hero-mascot" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- stick legs -->
        <line x1="36" y1="82" x2="30" y2="108" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
        <line x1="64" y1="82" x2="70" y2="108" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
        <!-- feet -->
        <line x1="22" y1="108" x2="38" y2="108" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
        <line x1="62" y1="108" x2="78" y2="108" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
        <!-- dish plate -->
        <ellipse cx="50" cy="83" rx="32" ry="7" fill="#e8f1fd"/>
        <ellipse cx="50" cy="80" rx="30" ry="6" fill="#1a73e8"/>
        <!-- dish dome -->
        <path d="M20 80 Q20 38 50 34 Q80 38 80 80 Z" fill="url(#heroGrad)"/>
        <!-- shine on dome -->
        <ellipse cx="36" cy="52" rx="8" ry="12" fill="rgba(255,255,255,0.15)" transform="rotate(-20 36 52)"/>
        <!-- orange handle -->
        <circle cx="50" cy="32" r="9" fill="#ff6b35"/>
        <circle cx="50" cy="24" r="6" fill="#ff6b35"/>
        <circle cx="50" cy="18" r="4" fill="#ff8c5a"/>
        <!-- eyes -->
        <circle cx="38" cy="62" r="6" fill="white"/>
        <circle cx="62" cy="62" r="6" fill="white"/>
        <circle cx="39.5" cy="63" r="3" fill="#0d47a1"/>
        <circle cx="63.5" cy="63" r="3" fill="#0d47a1"/>
        <circle cx="40.5" cy="62" r="1.2" fill="white"/>
        <circle cx="64.5" cy="62" r="1.2" fill="white"/>
        <!-- smile -->
        <path d="M38 72 Q50 80 62 72" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <defs>
          <linearGradient id="heroGrad" x1="20" y1="34" x2="80" y2="80" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4d9fff"/>
            <stop offset="100%" stop-color="#1a73e8"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="hero-stat">
        <div class="num" id="totalCount">0</div>
        <div class="lbl">Photos</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="input-row">
      <div class="inp-wrap">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="sInp" placeholder="e.g. grilled salmon, sushi, tiramisu, chicken burger…" autocomplete="off"/>
      </div>
      <button class="btn btn-primary" onclick="addItems()">+ Add</button>
    </div>
    <div class="tags" id="sTags"></div>
    <div class="ctrl">
      <div class="srcs">
        <button class="pill on-pexels"  id="p-pexels"  onclick="tog('pexels')"><span class="pip"></span>Pexels</button>
        <button class="pill on-pixabay" id="p-pixabay" onclick="tog('pixabay')"><span class="pip"></span>Pixabay</button>
      </div>
      <div class="sep"></div>
      <div class="opt"><span>Per source:</span>
        <select id="pp"><option value="4" selected>4</option><option value="6">6</option><option value="8">8</option><option value="12">12</option></select>
      </div>
      <label class="chk"><input type="checkbox" id="noH" checked/>Food only</label>
      <button class="btn btn-primary mla" id="goBtn" onclick="doSearch()" style="display:none">
        Search images →
      </button>
    </div>
  </div>

  <div class="pgw" id="pg"><div class="pgb" id="pgb"></div></div>
  <div class="strow"><div class="spin" id="spin"></div><span id="stat"></span></div>
  <div id="results"></div>
  <div class="empty" id="empty">
    <span class="ei">🍽</span>
    <div class="et">Add your menu items</div>
    <div class="es">Type a dish above, press Add, then Search</div>
  </div>
</main>

<!-- LIGHTBOX -->
<div id="lb" onclick="lbBg(event)">
  <div class="lbb" onclick="event.stopPropagation()">
    <div class="lia" id="lia">
      <div class="spin on" id="lbspin"></div>
      <img id="lbimg" alt="" onload="lbLoad()" onerror="lbErr()"/>
    </div>
    <div class="lif">
      <div class="lit">
        <div class="litn" id="lbttl">—</div>
        <div class="lisu" id="lbsub">—</div>
      </div>
      <div class="lia-btns">
        <a class="lbtn p" id="lboBtn" href="#" target="_blank" rel="noopener">Open &amp; download free ↗</a>
        <button class="lcls" onclick="closeLb()">×</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let items=[],srcOn={pexels:true,pixabay:true},total=0;

function tog(s){
  srcOn[s]=!srcOn[s];
  document.getElementById('p-'+s).className='pill'+(srcOn[s]?` on-${s}`:'');
}
function addItems(){
  const inp=document.getElementById('sInp');
  const v=inp.value.trim();if(!v)return;
  v.split(/[,;]+/).map(x=>x.trim().toLowerCase()).filter(Boolean).forEach(x=>{
    if(x&&!items.includes(x))items.push(x);
  });
  inp.value='';renderTags();
}
document.getElementById('sInp').addEventListener('keydown',e=>{if(e.key==='Enter')addItems();});
function removeItem(i){items.splice(i,1);renderTags();}
function renderTags(){
  document.getElementById('sTags').innerHTML=items.map((it,i)=>
    `<div class="tag">${it}<button class="tx" onclick="removeItem(${i})">×</button></div>`
  ).join('');
  document.getElementById('goBtn').style.display=items.length?'flex':'none';
  document.getElementById('empty').style.display=items.length?'none':'';
}
async function apiFetch(source,query,n,noH){
  const q=encodeURIComponent(query+(noH?' food':''));
  const r=await fetch(`/api/${source}?query=${q}&per_page=${n}`);
  if(!r.ok)throw new Error(`${source} ${r.status}`);
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  return d.photos||[];
}
function skel(n){
  return Array.from({length:n},()=>`
    <div class="skc"><div class="ski"></div>
    <div class="skb"><div class="skl" style="width:75%"></div><div class="skl" style="width:50%"></div></div>
    </div>`).join('');
}
function card(img,srcKey){
  const badge=srcKey==='pexels'?'bp':'bx';
  const enc=encodeURIComponent(JSON.stringify({
    full:img.full||img.thumb,thumb:img.thumb,
    page:img.page,title:img.title,
    credit:'by '+img.photographer,source:img.source
  }));
  return `<div class="ic" onclick="openLb('${enc}')">
    <div class="ciw sk">
      <img src="/api/image?url=${encodeURIComponent(img.thumb)}" alt="${img.title}" loading="eager"
        onload="this.parentElement.classList.remove('sk')"
        onerror="this.parentElement.classList.remove('sk');this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;height:100%;color:#aac;font-size:12px>No preview</div>'"/>
      <span class="sbadge ${badge}">${img.source}</span>
      <div class="cov"><span class="covbtn">👁 Preview</span></div>
    </div>
    <div class="cb">
      <div class="ct">${img.title}</div>
      <div class="cm">
        <span class="cc">by ${img.photographer}</span>
        <span class="co">Open ↗</span>
      </div>
    </div>
  </div>`;
}
async function doSearch(){
  const active=Object.entries(srcOn).filter(([,v])=>v).map(([k])=>k);
  if(!active.length){toast('Select at least one source','err');return;}
  if(!items.length)return;
  const n=parseInt(document.getElementById('pp').value);
  const noH=document.getElementById('noH').checked;
  const res=document.getElementById('results');
  document.getElementById('empty').style.display='none';
  res.innerHTML='';
  document.getElementById('pg').classList.add('on');
  document.getElementById('pgb').style.width='0%';
  document.getElementById('spin').classList.add('on');
  total=0;document.getElementById('totalCount').textContent='0';
  let done=0;const totalOps=items.length*active.length;

  for(let i=0;i<items.length;i++){
    const item=items[i];
    document.getElementById('stat').textContent=`Fetching "${item}"… (${i+1}/${items.length})`;
    if(i>0){const d=document.createElement('div');d.className='idiv';res.appendChild(d);}
    const blk=document.createElement('div');
    blk.className='ib';blk.style.animationDelay=(i*0.05)+'s';
    blk.innerHTML=`<div class="ih"><span class="in">${item}</span><span class="itag" id="itag-${i}">loading…</span></div>`;
    res.appendChild(blk);
    let found=0;

    await Promise.all(active.map(async srcKey=>{
      const browseSrc=srcKey==='pexels'
        ?`https://www.pexels.com/search/${encodeURIComponent(item)}/`
        :`https://pixabay.com/photos/search/${encodeURIComponent(item)}/`;
      const label=srcKey==='pexels'?'Pexels':'Pixabay';
      const dotCls=srcKey==='pexels'?'dp':'dx';
      const grp=document.createElement('div');
      grp.className='sg';
      grp.innerHTML=`
        <div class="sl">
          <span class="sn"><span class="sdot ${dotCls}"></span>${label}</span>
          <a class="ball" href="${browseSrc}" target="_blank" rel="noopener">Browse all →</a>
        </div>
        <div class="cg" id="g-${i}-${srcKey}">${skel(n)}</div>`;
      blk.appendChild(grp);
      try{
        const photos=await apiFetch(srcKey,item,n,noH);
        const grid=document.getElementById(`g-${i}-${srcKey}`);
        if(photos.length){
          grid.innerHTML=photos.map(p=>card(p,srcKey)).join('');
          found+=photos.length;total+=photos.length;
          document.getElementById('totalCount').textContent=total;
        }else{
          grid.innerHTML=`<div style="grid-column:1/-1;padding:12px 0;font-size:13px;color:var(--text3)">No results. <a href="${browseSrc}" target="_blank" style="color:var(--fd-blue);font-weight:600">Browse ${label} →</a></div>`;
        }
      }catch(e){
        const grid=document.getElementById(`g-${i}-${srcKey}`);
        grid.innerHTML=`<div style="grid-column:1/-1;padding:12px 0;font-size:13px;color:var(--red)">${e.message}</div>`;
      }
      done++;
      document.getElementById('pgb').style.width=(done/totalOps*100)+'%';
    }));
    const tag=document.getElementById('itag-'+i);
    if(tag)tag.textContent=found+' photos';
  }
  document.getElementById('spin').classList.remove('on');
  document.getElementById('stat').textContent=`Done — ${total} photos across ${items.length} item${items.length>1?'s':''}`;
}

// LIGHTBOX - fixed
function openLb(enc){
  const img=JSON.parse(decodeURIComponent(enc));
  document.getElementById('lbttl').textContent=img.title||'Photo';
  document.getElementById('lbsub').textContent=(img.credit||'')+(img.source?' · '+img.source:'');
  document.getElementById('lboBtn').href=img.page||'#';
  const lbImg=document.getElementById('lbimg');
  lbImg.classList.remove('ready');
  document.getElementById('lbspin').style.display='block';
  lbImg.src='/api/image?url='+encodeURIComponent(img.full||img.thumb);
  document.getElementById('lb').style.display='flex';
}
function lbLoad(){
  document.getElementById('lbspin').style.display='none';
  document.getElementById('lbimg').classList.add('ready');
}
function lbErr(){
  document.getElementById('lbspin').style.display='none';
  document.getElementById('lia').innerHTML='<div style="color:#aaa;font-size:13px;padding:24px">Could not load image</div>';
}
function closeLb(){
  document.getElementById('lb').style.display='none';
  const lbImg=document.getElementById('lbimg');
  lbImg.classList.remove('ready');
  lbImg.src='';
  document.getElementById('lbspin').style.display='block';
}
function lbBg(e){if(e.target===document.getElementById('lb'))closeLb();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

let tt;
function toast(m,t=''){
  const el=document.getElementById('toast');
  el.textContent=m;el.className='show'+(t?' '+t:'');
  clearTimeout(tt);tt=setTimeout(()=>el.className='',3500);
}
</script>
</body>
</html>
